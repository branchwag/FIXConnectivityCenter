<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FIX Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" type="text/css" href="styles.css" />
  </head>
  <body>
    <div class="dashboard">
      <div class="dashboard-header">
        <h1 class="h5 mb-0">FIX Sessions</h1>
        <span id="meta" class="meta">connecting…</span>
      </div>

      <div id="offline" class="alert alert-danger py-2 d-none" role="alert">
        Engine unreachable
      </div>

      <table class="table table-dark table-hover align-middle">
        <thead>
          <tr>
            <th>Session</th>
            <th class="text-end">Status</th>
          </tr>
        </thead>
        <tbody id="sessionTableBody">
          <!-- Dynamically updated -->
        </tbody>
      </table>
    </div>

    <script>
      const tableBody = document.getElementById("sessionTableBody");
      const meta = document.getElementById("meta");
      const offline = document.getElementById("offline");

      // Connection state drives the header indicator. Starts as "connecting" so
      // a page refresh doesn't flash "offline" before the SSE stream connects.
      let connState = "connecting"; // "connecting" | "live" | "offline"
      let offlineTimer = null;
      let connected = 0;
      let total = 0;
      let lastChange = null;

      function renderMeta() {
        let dot;
        if (connState === "live") {
          dot = '<span class="text-success">●</span> monitoring live';
        } else if (connState === "offline") {
          dot = '<span class="text-danger">●</span> offline';
        } else {
          dot = '<span class="text-secondary">●</span> connecting…';
        }
        const changed = lastChange ? ` · last session event ${lastChange}` : "";
        meta.innerHTML = `${dot} · ${connected}/${total} connected${changed}`;
      }

      // A successful (re)connect: cancel any pending offline banner and hide it.
      function markLive() {
        connState = "live";
        clearTimeout(offlineTimer);
        offlineTimer = null;
        offline.classList.add("d-none");
      }

      function badge(status) {
        const cls = status === "Connected" ? "bg-success" : "bg-secondary";
        return `<span class="badge ${cls}">${status}</span>`;
      }

      function render(data) {
        // Each event carries the full session list, so just rebuild the table:
        // sessions that appear, disappear, or change status are all reflected.
        const sessions = data.sessions;
        tableBody.innerHTML = "";

        if (sessions.length === 0) {
          const row = document.createElement("tr");
          row.innerHTML = `<td colspan="2" class="text-center text-muted">No sessions</td>`;
          tableBody.appendChild(row);
        } else {
          for (const s of sessions) {
            const row = document.createElement("tr");
            row.innerHTML = `
              <td><code>${s.SessionID}</code></td>
              <td class="text-end">${badge(s.Status)}</td>`;
            tableBody.appendChild(row);
          }
        }

        connected = sessions.filter((s) => s.Status === "Connected").length;
        total = sessions.length;
        // Server-owned timestamp of the last real connect/disconnect, so it
        // doesn't move on a page refresh — only when a session logs on/out.
        lastChange = data.lastEventAt
          ? new Date(data.lastEventAt).toLocaleTimeString()
          : null;
        renderMeta();
      }

      // Server-Sent Events: the server pushes a fresh snapshot on every session
      // change (and once on connect). EventSource auto-reconnects if the app
      // restarts, so no polling loop is needed.
      function connect() {
        const es = new EventSource("/events");
        es.onopen = () => {
          markLive();
          renderMeta();
        };
        es.onmessage = (e) => {
          markLive();
          render(JSON.parse(e.data));
        };
        es.onerror = () => {
          // Don't flash "offline" on a transient blip (a refresh or a quick
          // reconnect). Only surface it if we stay down past a short grace
          // period; a successful (re)connect cancels this via markLive().
          if (connState === "offline" || offlineTimer) return;
          offlineTimer = setTimeout(() => {
            connState = "offline";
            offline.classList.remove("d-none");
            renderMeta();
          }, 1500);
        };
      }

      renderMeta();
      connect();
    </script>
  </body>
</html>
