<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FIX Dashboard</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" type="text/css" href="styles.css" />
  </head>
  <body>
    <div class="dashboard">
      <div class="dashboard-header">
        <h1 class="h5 mb-0">FIX Sessions</h1>
        <span id="meta" class="meta">connecting…</span>
      </div>

      <div id="offline" class="alert alert-danger py-2 d-none" role="alert">
        Engine unreachable — is the app running on this port?
      </div>

      <table class="table table-dark table-hover align-middle">
        <thead>
          <tr>
            <th>Session</th>
            <th class="text-end">Status</th>
          </tr>
        </thead>
        <tbody id="sessionTableBody">
          <!-- Dynamically updated -->
        </tbody>
      </table>
    </div>

    <script>
      const POLL_MS = 1500;
      const tableBody = document.getElementById("sessionTableBody");
      const meta = document.getElementById("meta");
      const offline = document.getElementById("offline");

      function badge(status) {
        const cls = status === "Connected" ? "bg-success" : "bg-secondary";
        return `<span class="badge ${cls}">${status}</span>`;
      }

      function render(sessions) {
        // Rebuild the whole table each tick so sessions that appear, disappear,
        // or change status are all reflected.
        tableBody.innerHTML = "";

        if (sessions.length === 0) {
          const row = document.createElement("tr");
          row.innerHTML = `<td colspan="2" class="text-center text-muted">No sessions</td>`;
          tableBody.appendChild(row);
        } else {
          // Stable order so rows don't jump around between polls.
          sessions.sort((a, b) => a.SessionID.localeCompare(b.SessionID));
          for (const s of sessions) {
            const row = document.createElement("tr");
            row.innerHTML = `
              <td><code>${s.SessionID}</code></td>
              <td class="text-end">${badge(s.Status)}</td>`;
            tableBody.appendChild(row);
          }
        }

        const connected = sessions.filter((s) => s.Status === "Connected").length;
        const now = new Date().toLocaleTimeString();
        meta.textContent = `${connected}/${sessions.length} connected · updated ${now}`;
      }

      async function loadSessions() {
        try {
          const response = await fetch("/sessions", { cache: "no-store" });
          if (!response.ok) throw new Error("HTTP " + response.status);
          render(await response.json());
          offline.classList.add("d-none");
        } catch (e) {
          offline.classList.remove("d-none");
          meta.textContent = "offline";
        }
      }

      loadSessions();
      setInterval(loadSessions, POLL_MS);
    </script>
  </body>
</html>
