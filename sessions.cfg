[DEFAULT]
ReconnectInterval=10
ScreenLogShowHeartbeats=Y
ScreenLogShowIncoming=Y
ScreenLogShowOutgoing=Y
# QuickFIX C++ requires an explicit session schedule and a dictionary decision
# (the Go engine defaulted these). UseDataDictionary=N relays messages without
# field-level validation, matching this app's pass-through behaviour.
StartTime=00:00:00
EndTime=00:00:00
UseDataDictionary=N

[SESSION]
SenderCompID=FIXDEV
BeginString=FIX.4.2
ConnectionType=initiator
TargetCompID=TEST
HeartBtInt=30
SocketConnectPort=9823
SocketConnectHost=127.0.0.1