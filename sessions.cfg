[DEFAULT]
ReconnectInterval=10
ScreenLogShowHeartbeats=Y
ScreenLogShowIncoming=Y
ScreenLogShowOutgoing=Y
# QuickFIX C++ requires an explicit session schedule and a dictionary decision.
# Each session names its FIX data dictionary (DataDictionary=spec/FIX4x.xml), and
# UseDataDictionary=Y makes the engine validate messages against it — the same
# dictionary the dashboard's FIX Parser decodes with, so the engine and parser
# agree. (Validation means non-conformant messages — missing required fields,
# unknown tags — are rejected rather than relayed.)
StartTime=00:00:00
EndTime=00:00:00
UseDataDictionary=Y
# Reset sequence numbers on each logon so a manual Disconnect -> Start re-links
# cleanly. Matches the in-app test counterparty (which also resets on logon);
# without this, the initiator's advanced inbound seqnum rejects the acceptor's
# reset logon ("MsgSeqNum too low"). Sequences aren't persisted anyway (the
# engine uses an in-memory message store).
ResetOnLogon=Y

[SESSION]
SenderCompID=FIXDEV
BeginString=FIX.4.2
DataDictionary=spec/FIX42.xml
ConnectionType=initiator
TargetCompID=TEST
HeartBtInt=30
SocketConnectPort=9823
SocketConnectHost=127.0.0.1

[SESSION]
SenderCompID=FIXDEV44
BeginString=FIX.4.4
DataDictionary=spec/FIX44.xml
ConnectionType=initiator
TargetCompID=TEST44
HeartBtInt=30
SocketConnectPort=9824
SocketConnectHost=127.0.0.1